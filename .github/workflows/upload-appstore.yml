name: Upload iOS App to App Store Connect

on:
  push:
    branches:
      - main  # Triggers the upload whenever code pushes to main
  workflow_dispatch: # Allows you to manually trigger this via the GitHub Actions tab

jobs:
  upload:
    runs-on: macos-latest # Mac runner: required for codesign + Apple upload tools

    env:
      # The committed binary is ad-hoc signed (built on Linux/WSL), so it has no
      # real Apple certificate. We re-sign it here with the Distribution identity
      # before uploading — otherwise App Store Connect rejects it with error 90034.
      SIGNING_IDENTITY: "Apple Distribution: SEONGWOO HONG (SPQDMJ2T53)"
      UNSIGNED_IPA: "./mobile.ipa"
      SIGNED_IPA: "./mobile-dist.ipa"

    steps:
      # 1. Check out your code repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1b. Select the newest installed Xcode and report the iOS SDK. The app is
      #     built against the iOS 26 SDK, so the runner needs a matching Xcode.
      #     If the SDK printed here is older than the app's target, switch
      #     `runs-on` above to a macOS image that ships Xcode 26 (e.g. macos-26).
      - name: Select latest Xcode and show iOS SDK
        run: |
          set -euo pipefail
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          LATEST="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          echo "Selected Xcode:"; xcodebuild -version
          echo "Available iOS SDKs:"; xcodebuild -showsdks | grep -i iphoneos || true
          echo "iphoneos SDK version: $(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iphoneos SDK build:   $(xcrun --sdk iphoneos --show-sdk-build-version)"

      # 2. Import the Distribution certificate (.p12) into a temporary keychain
      #    so codesign can find the signing identity.
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Import cert+key; allow codesign/security to use it without a UI prompt.
          security import "$CERT_PATH" -P "$P12_PASSWORD" -f pkcs12 \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Put our keychain first in the search list so codesign resolves the identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          echo "Imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # 3. Embed the App Store provisioning profile and re-sign the .app, then repackage.
      - name: Re-sign IPA with Distribution identity
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/resign"
          PROFILE="$RUNNER_TEMP/profile.mobileprovision"

          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE"

          rm -rf "$WORK"; mkdir -p "$WORK"
          unzip -q "$UNSIGNED_IPA" -d "$WORK"
          APP="$(ls -d "$WORK"/Payload/*.app)"
          echo "App bundle: $APP"

          # 3a. Inject the build-provenance keys Apple requires. A Linux/WSL build
          #     omits these (they're normally written by Xcode), which triggers
          #     "Missing Info.plist value 'DTPlatformName'" and "Unsupported SDK".
          #     Values are read from the real SDK installed on this runner, so they
          #     always reference a supported Xcode. Must run BEFORE codesign.
          INFO="$APP/Info.plist"
          PB=/usr/libexec/PlistBuddy
          SDK_VER="$(xcrun --sdk iphoneos --show-sdk-version)"
          SDK_BUILD="$(xcrun --sdk iphoneos --show-sdk-build-version)"
          PLAT_VER_PLIST="$(xcode-select -p)/Platforms/iPhoneOS.platform/version.plist"
          PLATFORM_BUILD="$($PB -c 'Print :ProductBuildVersion' "$PLAT_VER_PLIST" 2>/dev/null || echo "$SDK_BUILD")"
          XVER="$(xcodebuild -version | awk 'NR==1{print $2}')"
          XBUILD="$(xcodebuild -version | awk 'NR==2{print $3}')"
          DTXCODE="$(echo "$XVER" | awk -F. '{printf "%02d%d%d", $1, $2, ($3==""?0:$3)}')"
          OSBUILD="$(sw_vers --buildVersion)"

          set_key() { $PB -c "Add :$1 string $2" "$INFO" 2>/dev/null || $PB -c "Set :$1 $2" "$INFO"; }
          set_key DTPlatformName      "iphoneos"
          set_key DTPlatformVersion   "$SDK_VER"
          set_key DTPlatformBuild     "$PLATFORM_BUILD"
          set_key DTSDKName           "iphoneos$SDK_VER"
          set_key DTSDKBuild          "$SDK_BUILD"
          set_key DTXcode             "$DTXCODE"
          set_key DTXcodeBuild        "$XBUILD"
          set_key DTCompiler          "com.apple.compilers.llvm.clang.1_0"
          set_key BuildMachineOSBuild "$OSBUILD"
          echo "--- injected Info.plist build keys ---"
          for k in DTPlatformName DTPlatformVersion DTPlatformBuild DTSDKName DTSDKBuild \
                   DTXcode DTXcodeBuild DTCompiler BuildMachineOSBuild; do
            printf '  %s = %s\n' "$k" "$($PB -c "Print :$k" "$INFO")"
          done

          # 3b. Embed the provisioning profile (App Store builds require this).
          cp "$PROFILE" "$APP/embedded.mobileprovision"

          # 3c. Extract the entitlements that the profile authorizes.
          security cms -D -i "$PROFILE" > "$WORK/profile.plist"
          /usr/libexec/PlistBuddy -x -c 'Print :Entitlements' "$WORK/profile.plist" > "$WORK/entitlements.plist"
          echo "--- entitlements ---"; cat "$WORK/entitlements.plist"

          # 3d. Drop the stale ad-hoc signature, then sign any nested code, then the app.
          rm -rf "$APP/_CodeSignature"
          find "$APP" \( -name "*.framework" -o -name "*.dylib" -o -name "*.appex" \) -print0 \
            | while IFS= read -r -d '' nested; do
                codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$nested"
              done
          codesign --force --timestamp \
            --entitlements "$WORK/entitlements.plist" \
            --sign "$SIGNING_IDENTITY" "$APP"

          # 3e. Verify the signature is valid before we waste an upload round-trip.
          codesign --verify --deep --strict --verbose=2 "$APP"

          # 3f. Repackage (-y preserves any symlinks inside frameworks).
          ( cd "$WORK" && zip -qry "$GITHUB_WORKSPACE/${SIGNED_IPA#./}" Payload )
          echo "Re-signed IPA written to $SIGNED_IPA"

      # 4. Write the App Store Connect API key into the location Apple's tools expect.
      - name: Setup Apple API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      # 5. Validate and upload the freshly re-signed binary.
      - name: Validate and Upload to App Store Connect
        run: |
          echo "Validating App Asset..."
          xcrun altool --validate-app \
            -f "$SIGNED_IPA" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

          echo "Uploading App Binary..."
          xcrun altool --upload-app \
            -f "$SIGNED_IPA" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"
