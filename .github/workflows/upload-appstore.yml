name: Upload iOS App to App Store Connect

on:
  push:
    branches:
      - main  # Triggers the upload whenever code pushes to main
  workflow_dispatch: # Allows you to manually trigger this via the GitHub Actions tab

jobs:
  upload:
    runs-on: macos-latest # Using a Mac runner to utilize built-in Apple upload utilities

    steps:
      # 1. Check out your code repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Write the API Key into the directory structure required by Apple Tools
      - name: Setup Apple API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      # 3. Locate and upload the IPA binary compiled from your WSL machine
      # (Ensure you commit your generated .ipa or use a separate step to download it if it's an artifact)
      - name: Validate and Upload to App Store Connect
        run: |
          # Define the target path where your .ipa file is stored in the repository
          IPA_PATH="./mobile.ipa"
          
          echo "Validating App Asset..."
          xcrun altool --validate-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

          echo "Uploading App Binary..."
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"